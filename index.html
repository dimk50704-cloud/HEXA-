<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>2026每日經驗統計</title><style>
:root{--bg:#0b1220;--panel:#151f34;--soft:#1c2740;--line:#31456d;--text:#eef4ff;--muted:#a8b3cf;--accent:#7cc4ff;--accent2:#8cffc5;--warn:#ffd166;--danger:#ffb4b4}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0b1220,#10192b);color:var(--text)}
.wrap{max-width:1360px;margin:0 auto;padding:24px}.hero{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:flex-start;margin-bottom:20px}.hero h1{margin:0 0 8px;font-size:32px}.hero p{margin:0;color:var(--muted)}.badge{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#11213e;color:var(--accent)}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 20px}.nav a{text-decoration:none;padding:10px 14px;border-radius:12px;border:1px solid var(--line);color:var(--text)}.nav a.active{background:linear-gradient(135deg,var(--accent),#5aa3ff);color:#09111f;font-weight:800;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:18px}.card{background:rgba(21,31,52,.96);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 24px rgba(0,0,0,.22)} .card h2{margin:0 0 14px;font-size:20px} .card h3{margin:16px 0 10px;font-size:16px;color:var(--accent2)}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:13px;color:var(--muted)}
input,select,button{font:inherit} input,select{background:var(--soft);color:var(--text);border:1px solid var(--line);padding:10px 12px;border-radius:12px;outline:none} input:focus,select:focus{border-color:var(--accent)}
button{border:none;background:linear-gradient(135deg,var(--accent),#5aa3ff);color:#09111f;padding:10px 14px;border-radius:12px;font-weight:800;cursor:pointer}.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.result-panel{margin-top:14px;padding:14px;border-radius:14px;background:#0f1729;border:1px dashed var(--line)}.result-panel strong{color:var(--warn);font-size:22px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:10px}.kpi{background:var(--soft);padding:16px;border-radius:12px;border:1px solid var(--line);min-height:88px}.kpi span{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.kpi b{font-size:18px;word-break:break-all;line-height:1.3}
.table-wrap{overflow:auto;margin-top:12px} table{width:100%;border-collapse:collapse;min-width:520px} th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:center} th{background:#0e1628;color:var(--accent)}
.target-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.target-card{background:#0f1729;border:1px solid var(--line);border-radius:14px;padding:14px}.target-card .big{font-size:24px;font-weight:900;color:var(--warn)}
.note{font-size:12px;color:var(--muted);line-height:1.6}.footer{margin-top:24px;text-align:center;color:var(--muted);font-size:14px}.alert{margin-top:12px;padding:12px 14px;border-radius:14px;background:#2b1e1e;border:1px solid #5f2a2a;color:var(--danger)}
.center-links{display:flex;flex-direction:column;gap:16px;max-width:520px;margin:40px auto}.home-link{display:block;padding:18px 20px;border-radius:16px;background:#151f34;color:var(--text);text-decoration:none;border:1px solid var(--line)}.home-link strong{display:block;font-size:22px;margin-bottom:6px;color:var(--accent)}
@media (max-width:900px){.target-grid{grid-template-columns:1fr}} @media (max-width:720px){.form-grid,.kpis{grid-template-columns:1fr}}
</style></head>
